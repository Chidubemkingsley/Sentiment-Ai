<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SentimentArena — Market Mood Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080b10;
    --bg2:      #0d1117;
    --bg3:      #111820;
    --surface:  #131c27;
    --surface2: #19253a;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --bull:     #00e697;
    --bull-dim: #00e69722;
    --bear:     #ff3d5a;
    --bear-dim: #ff3d5a22;
    --neut:     #f0b429;
    --neut-dim: #f0b42920;
    --accent:   #5b8dee;
    --accent2:  #9b6dff;
    --text:     #e8edf5;
    --muted:    #5a6a82;
    --mono:     'Space Mono', monospace;
    --display:  'Barlow Condensed', sans-serif;
    --body:     'Inter', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(91,141,238,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,141,238,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 58px;
    border-bottom: 1px solid var(--border2);
    background: rgba(8,11,16,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--display);
    font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text);
  }
  .logo span { color: var(--bull); }
  .logo-badge {
    font-family: var(--mono); font-size: 9px; font-weight: 400;
    background: var(--bull-dim); color: var(--bull);
    border: 1px solid var(--bull); border-radius: 3px;
    padding: 2px 6px; margin-left: 10px; vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bull); box-shadow: 0 0 8px var(--bull);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .header-stat {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  .header-stat strong { color: var(--text); font-weight: 700; }
  .refresh-btn {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 4px; padding: 5px 10px; cursor: pointer;
    transition: all .15s;
  }
  .refresh-btn:hover { color: var(--bull); border-color: var(--bull); }

  .mood-banner {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; align-items: center; gap: 24px;
  }
  .mood-label { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .mood-track {
    flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; position: relative; overflow: visible;
  }
  .mood-fill {
    height: 100%; border-radius: 3px; transition: width .8s ease;
    background: linear-gradient(90deg, var(--bear) 0%, var(--neut) 50%, var(--bull) 100%);
    position: absolute; left: 0; top: 0;
  }
  .mood-cursor {
    position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: white; border: 2px solid var(--accent);
    transform: translate(-50%, -50%); transition: left .8s ease;
    box-shadow: 0 0 10px var(--accent);
  }
  .mood-endpoints { display: flex; gap: 8px; align-items: center; }
  .mood-val {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    padding: 3px 10px; border-radius: 4px;
  }
  .mood-val.bear { background: var(--bear-dim); color: var(--bear); border: 1px solid var(--bear); }
  .mood-val.bull { background: var(--bull-dim); color: var(--bull); border: 1px solid var(--bull); }

  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; flex: 1; }

  .left { padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--border); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .section-title {
    font-family: var(--display); font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }
  .section-count {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: var(--surface); padding: 2px 8px; border-radius: 3px;
  }

  .ticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .ticker-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 14px 12px;
    cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .ticker-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    transition: opacity .2s;
  }
  .ticker-card.bull::before { background: var(--bull); }
  .ticker-card.bear::before { background: var(--bear); }
  .ticker-card.neut::before { background: var(--neut); }
  .ticker-card:hover { border-color: var(--border2); transform: translateY(-1px); background: var(--surface2); }
  .ticker-card.active { border-color: var(--accent); background: var(--surface2); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-symbol {
    font-family: var(--display); font-size: 22px; font-weight: 800;
    letter-spacing: 1px; color: var(--text);
  }
  .card-badge {
    font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 7px; border-radius: 3px; text-transform: uppercase;
  }
  .badge-bull { background: var(--bull-dim); color: var(--bull); border: 1px solid var(--bull); }
  .badge-bear { background: var(--bear-dim); color: var(--bear); border: 1px solid var(--bear); }
  .badge-neut { background: var(--neut-dim); color: var(--neut); border: 1px solid var(--neut); }

  .card-score-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
  .card-score {
    font-family: var(--mono); font-size: 18px; font-weight: 700;
  }
  .score-bull { color: var(--bull); }
  .score-bear { color: var(--bear); }
  .score-neut { color: var(--neut); }
  .card-articles { font-size: 11px; color: var(--muted); }

  .score-bar-bg { height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
  .fill-bull { background: var(--bull); }
  .fill-bear { background: var(--bear); }
  .fill-neut { background: var(--neut); }

  .card-headline {
    font-size: 11px; color: var(--muted); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .right { background: var(--bg2); display: flex; flex-direction: column; }

  .detail-header {
    padding: 16px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .detail-symbol {
    font-family: var(--display); font-size: 32px; font-weight: 800; letter-spacing: 2px;
  }
  .detail-score-big {
    font-family: var(--mono); font-size: 26px; font-weight: 700;
    text-align: right;
  }

  .chart-wrap { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .chart-title { font-family: var(--display); font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .chart-container { height: 160px; position: relative; }

  .news-feed { flex: 1; overflow-y: auto; }
  .news-feed::-webkit-scrollbar { width: 4px; }
  .news-feed::-webkit-scrollbar-track { background: transparent; }
  .news-feed::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .feed-header { padding: 12px 18px 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg2); z-index: 5; }

  .news-item {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; cursor: pointer; transition: background .15s;
  }
  .news-item:hover { background: var(--surface); }

  .news-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .news-dot.bull { background: var(--bull); box-shadow: 0 0 6px var(--bull); }
  .news-dot.bear { background: var(--bear); box-shadow: 0 0 6px var(--bear); }
  .news-dot.neut { background: var(--neut); }

  .news-content { flex: 1; min-width: 0; }
  .news-title { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
  .news-meta { display: flex; gap: 8px; }
  .news-source { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .news-score { font-family: var(--mono); font-size: 10px; }
  .news-score.bull { color: var(--bull); }
  .news-score.bear { color: var(--bear); }
  .news-score.neut { color: var(--neut); }

  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0; border-bottom: 1px solid var(--border);
  }
  .stat-box {
    padding: 12px 16px; border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-box:last-child { border-right: none; }
  .stat-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); }
  .stat-key { font-family: var(--display); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

  .rank-col { padding: 16px 20px; border-top: 1px solid var(--border); }
  .rank-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 20px; }
  .rank-sym { font-family: var(--display); font-size: 16px; font-weight: 800; flex: 1; }
  .rank-bar-wrap { flex: 2; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .rank-bar { height: 100%; border-radius: 2px; }
  .rank-score { font-family: var(--mono); font-size: 11px; min-width: 42px; text-align: right; }

  .filter-tabs { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .tab {
    font-family: var(--mono); font-size: 11px; padding: 4px 10px;
    border: 1px solid var(--border2); border-radius: 4px; cursor: pointer;
    background: transparent; color: var(--muted); transition: all .15s;
  }
  .tab.active.bull-tab { border-color: var(--bull); color: var(--bull); background: var(--bull-dim); }
  .tab.active.bear-tab { border-color: var(--bear); color: var(--bear); background: var(--bear-dim); }
  .tab.active.all-tab  { border-color: var(--accent); color: var(--accent); background: rgba(91,141,238,.12); }
  .tab:hover { color: var(--text); }

  .tooltip { position: fixed; z-index: 9999; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 12px; font-size: 11px; pointer-events: none; display: none; max-width: 220px; }

  .loading { opacity: 0.5; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .right { border-top: 1px solid var(--border); }
    .ticker-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">Sentiment<span>Arena</span></div>
      <span class="logo-badge">LIVE</span>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <div class="header-stat">Updated <strong id="last-update">loading...</strong></div>
      <div class="header-stat">Next refresh in <strong id="countdown">30s</strong></div>
      <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
    </div>
  </header>

  <div class="mood-banner">
    <div class="mood-label">Market Mood</div>
    <div style="display:flex;align-items:center;gap:10px;flex:1;max-width:500px;">
      <span style="font-family:var(--mono);font-size:11px;color:var(--bear)">FEAR</span>
      <div class="mood-track" style="flex:1;">
        <div class="mood-fill" id="mood-fill" style="width:100%;"></div>
        <div class="mood-cursor" id="mood-cursor" style="left:50%;"></div>
      </div>
      <span style="font-family:var(--mono);font-size:11px;color:var(--bull)">GREED</span>
    </div>
    <div class="mood-endpoints">
      <div class="mood-val bear" id="mood-bear-pct">—</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">vs</div>
      <div class="mood-val bull" id="mood-bull-pct">—</div>
    </div>
    <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);min-width:60px;text-align:right;" id="mood-score-display">—</div>
  </div>

  <div class="main">

    <div class="left">

      <div class="stats-row" style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <div class="stat-box">
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-key">Articles / 24h</div>
        </div>
        <div class="stat-box">
          <div class="stat-val score-bull" id="stat-bull">—</div>
          <div class="stat-key">Bullish</div>
        </div>
        <div class="stat-box">
          <div class="stat-val score-bear" id="stat-bear">—</div>
          <div class="stat-key">Bearish</div>
        </div>
        <div class="stat-box">
          <div class="stat-val score-neut" id="stat-neut">—</div>
          <div class="stat-key">Neutral</div>
        </div>
      </div>

      <div style="display:flex;gap:8px;">
        <button class="tab active all-tab" onclick="setFilter('all',this)">All</button>
        <button class="tab bull-tab" onclick="setFilter('bullish',this)">🟢 Bullish</button>
        <button class="tab bear-tab" onclick="setFilter('bearish',this)">🔴 Bearish</button>
      </div>

      <div>
        <div class="section-header">
          <div class="section-title">Live Sentiment</div>
          <div class="section-count" id="ticker-count">10 assets</div>
        </div>
        <div class="ticker-grid" id="ticker-grid"></div>
      </div>

      <div>
        <div class="section-header">
          <div class="section-title">Sentiment Leaderboard</div>
        </div>
        <div id="leaderboard"></div>
      </div>

    </div>

    <div class="right">
      <div class="detail-header">
        <div>
          <div class="detail-symbol score-bull" id="detail-symbol">AAPL</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="detail-name">Apple Inc.</div>
        </div>
        <div>
          <div class="detail-score-big score-bull" id="detail-score">+0.00</div>
          <div class="card-badge badge-bull" style="font-size:10px;margin-top:4px;display:inline-block;" id="detail-badge">NEUTRAL</div>
        </div>
      </div>

      <div class="chart-wrap">
        <div class="chart-title">Sentiment over time</div>
        <div class="chart-container">
          <canvas id="sentiment-chart"></canvas>
        </div>
      </div>

      <div class="feed-header">
        <div class="section-title">Latest Headlines</div>
      </div>

      <div class="news-feed" id="news-feed"></div>
    </div>

  </div>
</div>

<script>
const TICKERS = [
  { symbol: 'AAPL', name: 'Apple Inc.' },
  { symbol: 'TSLA', name: 'Tesla, Inc.' },
  { symbol: 'BTC',  name: 'Bitcoin' },
  { symbol: 'ETH',  name: 'Ethereum' },
  { symbol: 'MSFT', name: 'Microsoft Corp.' },
  { symbol: 'NVDA', name: 'Nvidia Corp.' },
  { symbol: 'GOOGL',name: 'Alphabet Inc.' },
  { symbol: 'AMZN', name: 'Amazon.com' },
  { symbol: 'META', name: 'Meta Platforms' },
  { symbol: 'SPY',  name: 'S&P 500 ETF' },
]

const TICKER_MAP = Object.fromEntries(TICKERS.map(t => [t.symbol, t.name]))

let state = {}
let activeFilter = 'all'
let selectedTicker = 'AAPL'
let chart = null
let countdown = 30
let countdownTimer = null
let ws = null
let wsReconnectTimer = null

function labelClass(label) {
  return label === 'bullish' ? 'bull' : label === 'bearish' ? 'bear' : 'neut'
}

function scoreColor(score) {
  return score > 0.2 ? 'var(--bull)' : score < -0.2 ? 'var(--bear)' : 'var(--neut)'
}

function scoreClass(score) {
  return score > 0.2 ? 'score-bull' : score < -0.2 ? 'score-bear' : 'score-neut'
}

function badgeClass(label) {
  return label === 'bullish' ? 'badge-bull' : label === 'bearish' ? 'badge-bear' : 'badge-neut'
}

function barPct(score) {
  return Math.round(((score + 1) / 2) * 100)
}

function renderGrid() {
  const grid = document.getElementById('ticker-grid')
  const filtered = TICKERS.filter(t => {
    if (activeFilter === 'all') return true
    return state[t.symbol]?.label === activeFilter
  })
  document.getElementById('ticker-count').textContent = filtered.length + ' assets'

  grid.innerHTML = filtered.map(t => {
    const d = state[t.symbol] || { score: 0, label: 'neutral', articles: 0, latestTitle: 'Loading...' }
    const lc = labelClass(d.label || 'neutral')
    const sc = scoreClass(d.score || 0)
    const bc = badgeClass(d.label || 'neutral')
    const pct = barPct(d.score || 0)
    const fillClass = lc === 'bull' ? 'fill-bull' : lc === 'bear' ? 'fill-bear' : 'fill-neut'
    return `
      <div class="ticker-card ${lc} ${t.symbol === selectedTicker ? 'active' : ''}" onclick="selectTicker('${t.symbol}')">
        <div class="card-top">
          <div class="card-symbol">${t.symbol}</div>
          <div class="card-badge ${bc}">${(d.label || 'neutral').toUpperCase()}</div>
        </div>
        <div class="card-score-row">
          <div class="card-score ${sc}">${(d.score || 0) >= 0 ? '+' : ''}${(d.score || 0).toFixed(2)}</div>
          <div class="card-articles">${d.articles || 0} articles</div>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
        <div class="card-headline">${d.latestTitle || 'No data available'}</div>
      </div>
    `
  }).join('')
}

function renderLeaderboard() {
  const sorted = [...TICKERS].sort((a, b) => (state[b.symbol]?.score || 0) - (state[a.symbol]?.score || 0))
  const el = document.getElementById('leaderboard')
  el.innerHTML = sorted.map((t, i) => {
    const d = state[t.symbol] || { score: 0, label: 'neutral' }
    const lc = labelClass(d.label || 'neutral')
    const sc = scoreClass(d.score || 0)
    const pct = barPct(d.score || 0)
    const barColor = lc === 'bull' ? 'var(--bull)' : lc === 'bear' ? 'var(--bear)' : 'var(--neut)'
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ''
    return `
      <div class="rank-row" style="cursor:pointer;" onclick="selectTicker('${t.symbol}')">
        <div class="rank-num">${medal || (i+1)}</div>
        <div class="rank-sym" style="color:${scoreColor(d.score || 0)}">${t.symbol}</div>
        <div class="rank-bar-wrap">
          <div class="rank-bar" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <div class="rank-score ${sc}">${(d.score || 0) >= 0 ? '+' : ''}${(d.score || 0).toFixed(2)}</div>
      </div>
    `
  }).join('')
}

async function renderMoodBanner() {
  try {
    const resp = await fetch('/api/mood')
    if (resp.ok) {
      const mood = await resp.json()
      const pct = ((mood.score + 1) / 2) * 100
      const bullish = TICKERS.filter(t => (state[t.symbol]?.label || 'neutral') === 'bullish').length
      const bearish = TICKERS.filter(t => (state[t.symbol]?.label || 'neutral') === 'bearish').length

      document.getElementById('mood-cursor').style.left = pct.toFixed(1) + '%'
      document.getElementById('mood-score-display').textContent = (mood.score >= 0 ? '+' : '') + mood.score.toFixed(2)
      document.getElementById('mood-score-display').className = scoreClass(mood.score)
      document.getElementById('mood-bear-pct').textContent = bearish + ' BEAR'
      document.getElementById('mood-bull-pct').textContent = bullish + ' BULL'
    }
  } catch (e) {
    console.error('Failed to load mood:', e)
  }
}

async function renderStats() {
  try {
    const resp = await fetch('/api/stats')
    if (resp.ok) {
      const stats = await resp.json()
      document.getElementById('stat-total').textContent = stats.total_articles || 0
      document.getElementById('stat-bull').textContent = stats.bullish || 0
      document.getElementById('stat-bear').textContent = stats.bearish || 0
      document.getElementById('stat-neut').textContent = stats.neutral || 0
    }
  } catch (e) {
    console.error('Failed to load stats:', e)
  }
}

async function renderDetail(symbol) {
  const t = TICKERS.find(x => x.symbol === symbol)
  const d = state[symbol] || { score: 0, label: 'neutral' }
  if (!t) return
  
  const lc = labelClass(d.label || 'neutral')
  const sc = scoreClass(d.score || 0)
  const bc = badgeClass(d.label || 'neutral')

  document.getElementById('detail-symbol').textContent = symbol
  document.getElementById('detail-symbol').className = 'detail-symbol ' + sc
  document.getElementById('detail-name').textContent = t.name
  document.getElementById('detail-score').textContent = ((d.score || 0) >= 0 ? '+' : '') + (d.score || 0).toFixed(2)
  document.getElementById('detail-score').className = 'detail-score-big ' + sc
  document.getElementById('detail-badge').textContent = (d.label || 'neutral').toUpperCase()
  document.getElementById('detail-badge').className = 'card-badge ' + bc

  renderChart(symbol, d)
  await renderFeed(symbol)
}

function renderChart(symbol, d) {
  const ctx = document.getElementById('sentiment-chart').getContext('2d')
  const color = (d.label || 'neutral') === 'bullish' ? '#00e697' : (d.label || 'neutral') === 'bearish' ? '#ff3d5a' : '#f0b429'

  const history = d.history || []
  const labels = history.length > 0 
    ? Array.from({length: history.length}, (_, i) => `-${(history.length-i)*5}m`)
    : Array.from({length: 20}, (_, i) => `-${(20-i)*5}m`)
  
  const data = history.length > 0 
    ? history 
    : Array.from({length: 20}, () => (Math.random() * 2 - 1).toFixed(2))

  if (chart) chart.destroy()
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: color,
        tension: 0.4,
        fill: true,
        backgroundColor: (ctx2) => {
          const g = ctx2.chart.ctx.createLinearGradient(0, 0, 0, 160)
          g.addColorStop(0, color + '40')
          g.addColorStop(1, color + '00')
          return g
        }
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => (ctx.raw >= 0 ? '+' : '') + Number(ctx.raw).toFixed(2) },
        backgroundColor: '#19253a', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
        titleColor: '#5a6a82', bodyColor: '#e8edf5', titleFont: { family: 'Space Mono', size: 10 },
        bodyFont: { family: 'Space Mono', size: 12 },
      }},
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6a82', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 5 }, border: { display: false } },
        y: {
          min: -1, max: 1,
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#5a6a82', font: { family: 'Space Mono', size: 9 },
            callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) },
          border: { display: false }
        }
      }
    }
  })
}

async function renderFeed(symbol) {
  const feed = document.getElementById('news-feed')
  
  try {
    const resp = await fetch(`/api/news/${symbol}`)
    if (resp.ok) {
      const news = await resp.json()
      if (news.length > 0) {
        feed.innerHTML = news.map(item => {
          const score = item.score || 0
          const lc = labelClass(score > 0.2 ? 'bullish' : score < -0.2 ? 'bearish' : 'neutral')
          const sc = scoreClass(score)
          const time = item.time ? new Date(item.time).toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'}) : 'recent'
          return `
            <div class="news-item">
              <div class="news-dot ${lc}"></div>
              <div class="news-content">
                <div class="news-title">${item.title}</div>
                <div class="news-meta">
                  <span class="news-source">${item.source || 'Unknown'} · ${time}</span>
                  <span class="news-score ${lc}">${score >= 0 ? '+' : ''}${score.toFixed(2)}</span>
                </div>
              </div>
            </div>
          `
        }).join('')
        return
      }
    }
  } catch (e) {
    console.error('Failed to load news:', e)
  }
  
  feed.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">No news available</div>'
}

function selectTicker(symbol) {
  selectedTicker = symbol
  document.querySelectorAll('.ticker-card').forEach(c => {
    c.classList.toggle('active', c.querySelector('.card-symbol')?.textContent === symbol)
  })
  renderDetail(symbol)
}

function setFilter(filter, btn) {
  activeFilter = filter
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderGrid()
}

async function refreshData() {
  try {
    const resp = await fetch('/api/sentiment')
    if (resp.ok) {
      state = await resp.json()
    }
  } catch (e) {
    console.error('Failed to fetch sentiment:', e)
  }
  
  renderGrid()
  renderLeaderboard()
  await renderMoodBanner()
  await renderStats()
  await renderDetail(selectedTicker)
  
  const now = new Date()
  document.getElementById('last-update').textContent =
    now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
  countdown = 30
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer)
  countdownTimer = setInterval(() => {
    countdown--
    document.getElementById('countdown').textContent = countdown + 's'
    if (countdown <= 0) { refreshData() }
  }, 1000)
}

function connectWebSocket() {
  try {
    ws = new WebSocket(window.location.protocol === 'https:' ? 'wss:' : 'ws:' + '//' + window.location.host + '/ws')
    
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data)
        if (data.type === 'update') {
          state[data.symbol] = data.payload
          renderGrid()
          renderLeaderboard()
          if (selectedTicker === data.symbol) {
            renderDetail(selectedTicker)
          }
        }
      } catch (e) {}
    }
    
    ws.onclose = () => {
      wsReconnectTimer = setTimeout(connectWebSocket, 5000)
    }
    
    ws.onerror = () => {
      ws.close()
    }
  } catch (e) {
    wsReconnectTimer = setTimeout(connectWebSocket, 5000)
  }
}

refreshData()
startCountdown()
connectWebSocket()
</script>
</body>
</html>
